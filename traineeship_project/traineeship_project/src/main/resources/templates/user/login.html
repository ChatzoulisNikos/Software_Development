<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

	<title>Login</title>
</head>


<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
	<br><br><br>
    <form th:action="@{/login}" method="POST"  class="w-50 p-4 border rounded bg-light">
        <h3 class="text-center">Login</h3><br />
        <input type="text" name="username" th:placeholder="Username" class="form-control form-control-lg"/> <br />
        <input type="password" th:placeholder="Password" name="password" class="form-control form-control-lg"/> <br />
        <button type="Submit" class="btn btn-primary btn-lg btn-block"> Login </button>
        <div class="container d-flex justify-content-center align-items-center">
        	<a th:href="@{/register}"> Not a user? Register </a><br />
        </div>
        <div th:if="${param.error}"><p>Username or Password is invalid.</p></div> <br/> 
   
   		<div th:utext="${successMessage}"></div>
    </form>

</div>

</body>
</html>
