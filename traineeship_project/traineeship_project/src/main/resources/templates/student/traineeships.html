<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

	<title>Available Traineeships</title>
</head>


<body>

<div class="container">
<br/>
<h3>Available Traineeships</h3>
<br/>
<table class="table table-bordered table-striped">
	<thead class="thead-dark">
		<tr>
			<th>Title</th>
			<th>Description</th>
			<th>Start Date</th>
			<th>End Date</th>
			<th>topics</th>
			<th>skills</th>
			<th></th>
		</tr>
	</thead>
	
	<tbody>
		<tr th:each="traineeship : ${traineeships}">
		
			<td th:text="${traineeship.title}" />	
			<td th:text="${traineeship.description}" />	
			<td th:text="${traineeship.fromDate}" />
			<td th:text="${traineeship.toDate}" />
			<td>
				<span th:each="topic : ${traineeship.topics.split(',')}">
				    <p th:text="${topic}"></p>
				</span>
			</td>
			<td>
				<span th:each="skill : ${traineeship.skills.split(',')}">
				    <p th:text="${skill}"></p>
				</span>
			</td>
			<td>
				
				<!-- Add "assign" button/link -->	
				<a th:href="@{/applied-users(id=${userId}, traineeshipId=${traineeship.id})}"
				   class="btn btn-danger btn-sm" 
				   onclick="if (!(confirm('Are you sure you want to assign this traineeship?'))) return false">	Assign
				</a>
				
			</td>
			
			
		</tr>
	</tbody>		
</table>
<hr> 
<a th:href="@{/}" class="btn btn-primary btn-sm mb-3"> Homepage</a>
</div>

</body>
