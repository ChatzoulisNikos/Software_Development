<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

	<title>Company Evaluation</title>
</head>


<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <form class="w-50 p-4 border rounded bg-light" action="#" th:action="@{/save-member-evaluation}" method="post">
	    <input hidden th:value="${id}" name="id">
	    <h3 class="text-center">Company Evaluation</h3><br/>
	    <label>Motivation:</label>
		<input disabled type="range" th:field="${comp.motivation}" min="1" max="5" value="3" class="form-control form-control-lg">

		<label>Effectiveness:</label>
		<input disabled type="range" th:field="${comp.effectiveness}" min="1" max="5" value="3" class="form-control form-control-lg">
		
		<label>Efficiency:</label>
		<input disabled type="range" th:field="${comp.efficiency}" min="1" max="5" value="3" class="form-control form-control-lg">

		<h3 class="text-center">Professor Evaluation</h3><br/>
	    <label>Motivation:</label>
		<input disabled type="range" th:field="${prof.motivation}" min="1" max="5" value="3" class="form-control form-control-lg">

		<label>Effectiveness:</label>
		<input disabled type="range" th:field="${prof.effectiveness}" min="1" max="5" value="3" class="form-control form-control-lg">
		
		<label>Efficiency:</label>
		<input disabled type="range" th:field="${prof.efficiency}" min="1" max="5" value="3" class="form-control form-control-lg">

	    <label>Facilities:</label>
		<input disabled type="range" th:field="${prof.facilities}" min="1" max="5" value="3" class="form-control form-control-lg">
		
		<label>Guidance:</label>
		<input disabled type="range" th:field="${prof.guidance}" min="1" max="5" value="3" class="form-control form-control-lg">

		<br/>
		<div class="btn-group" role="group">
        <input type="radio" class="btn-check" name="grade" id="pass" value="true" autocomplete="off">
        <label class="btn btn-outline-success" for="pass">Pass</label>
        
        <input type="radio" class="btn-check" name="grade" id="fail" value="false" autocomplete="off">
        <label class="btn btn-outline-danger" for="fail">Fail</label>
    	</div>
	    
	    <br/><br/>
	    <button type="submit" class="btn btn-primary btn-lg btn-block">Submit</button> 
	</form>
</div>
</body>
</html>
